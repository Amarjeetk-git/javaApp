apiVersion: apps/v1
kind: Deployment
metadata:
  name: stage-app-deployment
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mavenwebproject
      env: stage
  template:
    metadata:
      labels:
        app: mavenwebproject
        env: stage
    spec:
      containers:
      - name: mavenwebapp-container
        image: amar684/javaprogram:${BUILD_NUMBER}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: stage-app-service
spec:
  type: NodePort
  selector:
    app: mavenwebproject
    env: stage
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
