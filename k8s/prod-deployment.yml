apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-app-deployment
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mavenwebproject
      env: prod
  template:
    metadata:
      labels:
        app: mavenwebproject
        env: prod
    spec:
      containers:
      - name: mavenwebapp-container
        image: amar684/javaprogram:${BUILD_NUMBER}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: prod-app-service
spec:
  type: LoadBalancer
  selector:
    app: mavenwebproject
    env: prod
  ports:
    - port: 80
      targetPort: 8080
