apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-app-deployment
spec:
  replicas: 1
  strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
  selector:
    matchLabels:
      app: mavenwebproject
      env: dev
  template:
    metadata:
      labels:
        app: mavenwebproject
        env: dev
    spec:
      containers:
      - name: mavenwebapp-container
        image: amar684/javaprogram:${BUILD_NUMBER}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dev-app-service
spec:
  type: NodePort
  selector:
    app: mavenwebproject
    env: dev
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
