apiVersion: apps/v1
kind: Deployment
metadata:
  name: mavenwebapp-deployment
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mavenwebproject
  template:
    metadata:
      labels:
        app: mavenwebproject
    spec:
      containers:
      - name: mavenwebapp-container
        image: amar684/javaprogram:latest   # <-- updated to Docker Hub repo
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mavenwebapp-service
spec:
  type: LoadBalancer
  selector:
    app: mavenwebproject
  ports:
    - port: 80
      targetPort: 8080
